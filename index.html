  if (!sale) return;
  const itens = getSaleItens(sale);
  const numero = getSaleNumero(sale);
  const isTroca = sale.tipo === 'troca';
  const d = new Date(sale.dataHora);
  const dataStr = isNaN(d.getTime()) ? '-' : d.toLocaleDateString('pt-BR');
  const horaStr = isNaN(d.getTime()) ? '-' : d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  const margem = sale.custoTotal > 0 ? (sale.lucro / sale.custoTotal) * 100 : 0;
  const obs = getSaleObs(sale);
  const formaPagStr = isTroca
    ? `Troca${sale.trocaProdutoNome ? ' por ' + escapeHtml(sale.trocaProdutoNome) : ''}${sale.trocaDinheiro>0 ? ' + '+fmt(sale.trocaDinheiro)+' em dinheiro' : ''}`
    : escapeHtml(sale.formaPagamento || '-');

  const itensRows = itens.map(it => `
    <tr>
      <td style="padding:8px 6px;font-size:12px">${escapeHtml(it.produtoNome)}</td>
      <td style="padding:8px 6px;font-size:12px;text-align:center">${it.qtd}</td>
      <td style="padding:8px 6px;font-size:12px;text-align:right">${it.precoUnitario != null ? fmt(it.precoUnitario) : '—'}</td>
      <td style="padding:8px 6px;font-size:12px;text-align:right;font-weight:600">${fmt(it.subtotal != null ? it.subtotal : (it.qtd*it.precoUnitario))}</td>
    </tr>`).join('');

  openModal(`
    <h3>Venda #${numero}</h3>
    <div class="hint-box" style="flex-wrap:wrap;gap:8px 20px;font-size:12px">
      <div style="min-width:110px"><strong>Data:</strong> ${dataStr}</div>
      <div style="min-width:90px"><strong>Hora:</strong> ${horaStr}</div>
      <div style="min-width:140px"><strong>Cliente:</strong> ${escapeHtml(sale.cliente || 'Final')}</div>
      <div style="flex:1;min-width:160px"><strong>Pagamento:</strong> ${formaPagStr}</div>
    </div>
    <div style="overflow-x:auto;margin-bottom:14px;border:1px solid var(--slate-100);border-radius:12px">
      <table style="width:100%">
        <thead>
          <tr>
            <th style="padding:8px 6px;font-size:10px">Produto</th>
            <th style="padding:8px 6px;font-size:10px;text-align:center">Qtd</th>
            <th style="padding:8px 6px;font-size:10px;text-align:right">Preço Unit.</th>
            <th style="padding:8px 6px;font-size:10px;text-align:right">Subtotal</th>
          </tr>
        </thead>
        <tbody>${itensRows}</tbody>
      </table>
    </div>
    <div class="profit-box" style="flex-direction:column;align-items:stretch;gap:6px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between"><span>Total da Venda</span><span class="amt">${fmt(sale.faturamento)}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Lucro da Venda</span><span class="amt">${fmt(sale.lucro)}</span></div>
      <div style="display:flex;justify-content:space-between"><span>Margem</span><span class="amt">${fmtPct(margem)}</span></div>
    </div>
    ${obs ? `<div class="hint-box"><div><strong>Observações:</strong> ${escapeHtml(obs)}</div></div>` : ''}
    <div class="modal-actions">
      <button type="button" class="btn-secondary" style="flex:1" onclick="closeModal(); openSaleModal({editId:${sale.id}})">✎ Editar</button>
      <button type="button" class="btn-secondary" style="flex:1" onclick="closeModal(); openSaleModal({duplicateFrom:${sale.id}})">⧉ Duplicar</button>
    </div>
    <div class="modal-actions" style="margin-top:8px">
      <button type="button" class="btn-secondary" style="flex:1;background:var(--rose-50);color:var(--rose-700)" onclick="cancelSale(${sale.id})">✕ Cancelar Venda</button>
      <button type="button" class="btn-secondary" style="flex:1" onclick="closeModal()">Fechar</button>
    </div>
  `);
}

// ==========================================
// REVISÃO EM LOTE: FORMA DE PAGAMENTO DE VENDAS ANTIGAS
// ==========================================
// Muitas vendas antigas foram marcadas automaticamente como "Dinheiro" pela
// migração de compatibilidade (migrarFormaPagamento), mesmo quando a forma real
// não era conhecida. Este modal permite revisar e corrigir rapidamente, venda a
// venda, sem precisar abrir cada uma individualmente em "Editar".
function openRevisarPagamentosModal(filtro = 'dinheiro') {
  const todasVendas = [...state.sales].sort((a, b) => new Date(a.dataHora) - new Date(b.dataHora));
  const qtdMarcadasDinheiro = todasVendas.filter(v => v.formaPagamento === 'Dinheiro').length;
  const vendas = filtro === 'dinheiro' ? todasVendas.filter(v => v.formaPagamento === 'Dinheiro') : todasVendas;

  const rows = vendas.map(v => {
    const itens = getSaleItens(v);
    const nomeLinha = itens.length > 1 ? `${escapeHtml(itens[0].produtoNome)} + ${itens.length - 1} produto(s)` : escapeHtml(itens[0].produtoNome);
    const botoes = FORMAS_PAGAMENTO_VENDA.map(f =>
      `<button type="button" class="margin-btn ${v.formaPagamento === f ? 'active' : ''}" onclick="setVendaFormaPagamento(${v.id}, '${f}', '${filtro}')">${f}</button>`
    ).join('');
    return `
      <div style="padding:10px 2px;border-top:1px solid var(--slate-100)">
        <div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:6px">
          <div>
            <p style="margin:0;font-weight:600;font-size:13px;color:var(--slate-900)">${nomeLinha}</p>
            <p style="margin:2px 0 0;font-size:11px;color:var(--slate-500)">${escapeHtml(v.cliente || 'Cliente Final')} • ${formatDataHora(v.dataHora)}</p>
          </div>
          <p style="margin:0;font-weight:700;font-size:13px;white-space:nowrap">${fmt(v.faturamento)}</p>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${botoes}</div>
      </div>`;
  }).join('');

  openModal(`
    <h3>Revisar Formas de Pagamento</h3>
    <p style="font-size:12px;color:var(--slate-500);margin:-8px 0 14px">
      Vendas antigas sem forma de pagamento registrada foram marcadas automaticamente como "Dinheiro".
      Clique no botão certo em cada venda que você lembrar ter sido PIX ou Cartão.
    </p>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
      <button type="button" class="margin-btn ${filtro==='dinheiro'?'active':''}" onclick="openRevisarPagamentosModal('dinheiro')">Marcadas como Dinheiro (${qtdMarcadasDinheiro})</button>
      <button type="button" class="margin-btn ${filtro==='todas'?'active':''}" onclick="openRevisarPagamentosModal('todas')">Todas as vendas (${todasVendas.length})</button>
    </div>
    <div style="max-height:340px;overflow-y:auto;border:1px solid var(--slate-100);border-radius:12px;padding:0 14px">
      ${rows || '<p class="empty-note" style="padding:16px 0">Nenhuma venda para revisar aqui. 🎉</p>'}
    </div>
    <div class="modal-actions" style="margin-top:16px">
      <button type="button" class="btn-secondary" style="flex:1" onclick="closeModal()">Concluir</button>
    </div>`);
}

// Atualiza a forma de pagamento de uma venda específica e atualiza o modal em tempo real
function setVendaFormaPagamento(id, forma, filtro) {
  const idx = state.sales.findIndex(v => v.id === id);
  if (idx === -1) return;
  state.sales[idx] = { ...state.sales[idx], formaPagamento: forma };
  persist();
  render();
  openRevisarPagamentosModal(filtro);
  showToast(`Marcado como "${forma}".`);
}

// ==========================================
// BACKUP: EXPORTAR / IMPORTAR
// ==========================================
function openBackupModal() {
  openModal(`
        <h3>Backup de Dados</h3>
        <p style="font-size:12px;color:var(--slate-500);margin:-8px 0 16px">
          Seus dados ficam salvos apenas neste navegador. Exporte um arquivo de backup regularmente,
          ou para levar seus dados para outro computador/navegador.
        </p>

        <div class="hint-box" style="margin-bottom:16px">
          📦 Você tem <strong>${state.products.length}</strong> produto(s), <strong>${state.purchases.length}</strong> compra(s),
          <strong>${state.sales.length}</strong> venda(s), <strong>${state.deliveries.length}</strong> entrega(s)
          e <strong>${state.expenses.length}</strong> despesa(s) registrados agora.
        </div>

        <button class="btn-primary" style="width:100%;margin-bottom:10px" onclick="exportBackup()">⬇ Baixar backup (.json)</button>

        <label class="btn-secondary" style="width:100%;display:block;text-align:center;cursor:pointer;box-sizing:border-box">
          ⬆ Importar backup (.json)
          <input type="file" accept="application/json,.json" id="importFile" style="display:none" />
        </label>

        <p id="importWarn" style="font-size:11px;color:var(--rose-600);font-weight:600;text-align:center;margin:10px 0 0"></p>

        <div class="modal-actions" style="margin-top:16px">
          <button type="button" class="btn-secondary" style="flex:1" onclick="closeModal()">Fechar</button>
        </div>`);

  $('importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const parsed = JSON.parse(evt.target.result);
        if (!parsed.products || !parsed.purchases || !parsed.sales) {
          throw new Error('formato inválido');
        }
        const confirmMsg = `Isso vai SUBSTITUIR os dados atuais (${state.products.length} produtos, ${state.purchases.length} compras, ${state.sales.length} vendas) pelos do arquivo (${parsed.products.length} produtos, ${parsed.purchases.length} compras, ${parsed.sales.length} vendas). Continuar?`;
        if (!confirm(confirmMsg)) return;
        state = migrarNovasListas(migrarFormaPagamento(migrarDatas(parsed)));
        persist();
        closeModal();
        render();
        showToast('Backup importado com sucesso!');
      } catch (err) {
        $('importWarn').textContent = 'Arquivo inválido. Selecione um backup .json gerado por este app.';
      }
    };
    reader.readAsText(file);
  });
}

function exportBackup() {
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `revendapro-backup-${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Backup baixado com sucesso.');
}

render();
</script>
</body>
